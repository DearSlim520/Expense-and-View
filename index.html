<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账">
<title>Slim 记账</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --surface2: #f0eeea;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #1a1917;
  --muted: #777470;
  --hint: #aaa8a4;
  --blue: #5b9cf6;
  --green: #56c27a;
  --amber: #f0a946;
  --red: #e05c5c;
  --pink: #d47ab0;
  --purple: #9e7fe8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }
body { max-width: 480px; margin: 0 auto; padding: 0 0 80px; min-height: 100vh; }

/* Header */
.header { padding: 52px 20px 24px; }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; }
.header h1 { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 400; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px; }
.total-display { font-family: 'DM Mono', monospace; font-size: 38px; font-weight: 300; letter-spacing: -.02em; color: var(--text); line-height: 1; }
.total-label { font-size: 11px; color: var(--hint); margin-top: 6px; letter-spacing: .04em; }
.refresh-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all .15s; }
.refresh-btn:hover { background: var(--surface2); color: var(--text); }

/* Metrics row */
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 20px 24px; }
.metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px; }
.metric-card .label { font-size: 10px; color: var(--hint); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
.metric-card .value { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 400; color: var(--text); }
.metric-card .sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* Section */
.section { padding: 0 20px; margin-bottom: 28px; }
.section-title { font-size: 10px; color: var(--hint); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

/* Chart */
.chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
.chart-wrap { position: relative; height: 180px; }
.legend-row { display: flex; gap: 14px; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }

/* Account bars */
.acct-list { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.acct-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); position: relative; }
.acct-row:last-child { border-bottom: none; }
.acct-bar-bg { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(255,255,255,0.025); border-radius: 0; pointer-events: none; }
.acct-name { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); width: 80px; flex-shrink: 0; position: relative; z-index: 1; }
.acct-amount { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-left: auto; position: relative; z-index: 1; }
.acct-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; position: relative; z-index: 1; }

/* Year tabs */
.tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 12px; }
.tab { flex: 1; text-align: center; padding: 6px 0; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); border-radius: 7px; cursor: pointer; transition: all .15s; }
.tab.active { background: var(--surface2); color: var(--text); }

/* Ledger */
.ledger { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.ledger-head { display: grid; grid-template-columns: 68px 1fr 76px; padding: 9px 14px; font-size: 10px; color: var(--hint); letter-spacing: .06em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.ledger-row { display: grid; grid-template-columns: 68px 1fr 76px; padding: 10px 14px; border-bottom: 1px solid var(--border); align-items: center; transition: background .1s; }
.ledger-row:last-child { border-bottom: none; }
.ledger-row:hover { background: var(--surface2); }
.row-date { font-size: 10px; color: var(--hint); font-family: 'DM Mono', monospace; line-height: 1.5; }
.row-desc { display: flex; flex-direction: column; gap: 2px; }
.row-acct { font-size: 11px; font-family: 'DM Mono', monospace; }
.row-note { font-size: 11px; color: var(--muted); }
.row-amt { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); }
.savings-row .row-amt { color: var(--green); }

/* Account filter pills */
.acct-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.pill { font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border2); color: var(--muted); cursor: pointer; transition: all .12s; }
.pill.active { border-color: rgba(255,255,255,0.25); color: var(--text); background: var(--surface2); }

/* Loading */
.loading { text-align: center; padding: 60px 20px; font-size: 12px; color: var(--hint); font-family: 'DM Mono', monospace; letter-spacing: .08em; }
.error-msg { background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.2); border-radius: 10px; padding: 14px 16px; margin: 0 20px; font-size: 12px; color: var(--red); }
.error-msg a { color: var(--blue); }

/* Bottom nav */
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(247,246,243,0.92); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding: 8px 0 20px; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; cursor: pointer; color: var(--hint); transition: color .15s; font-size: 10px; letter-spacing: .04em; }
.nav-item.active { color: var(--text); }
.nav-icon { font-size: 18px; line-height: 1; }
</style>
</head>
<body>

<div id="app">
  <div class="loading" id="loadingMsg">loading data ...</div>
</div>

<nav class="nav">
  <div class="nav-item active" onclick="showView('overview')" id="nav-overview">
    <span class="nav-icon">◈</span>
    <span>概览</span>
  </div>
  <div class="nav-item" onclick="showView('ledger')" id="nav-ledger">
    <span class="nav-icon">≡</span>
    <span>流水</span>
  </div>
  <div class="nav-item" onclick="showView('accounts')" id="nav-accounts">
    <span class="nav-icon">◎</span>
    <span>账户</span>
  </div>
</nav>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRP9435oq8YLueHUriwI_siWq0L3-GXWZNtgmL4zc9zHY1S9uLywjbv0XabimiTihT9_lyAS6dYdqK6/pub?output=csv';

// ── COLORS ──────────────────────────────────────────────────────────────
const COLORS = {
  freedom:'#5b9cf6', bilt:'#56c27a', uar:'#f0a946', hood:'#d47ab0',
  apple:'#888580', discover:'#9e7fe8', amex:'#3dbf8a', car:'#4aad6b',
  房租:'#e05c5c', hermes:'#f0a946', coin:'#e05c5c', boa:'#5b9cf6',
  savings:'#56c27a', travel:'#9e7fe8', personal:'#f0a946',
  car_insurance:'#666', medical:'#e05c5c', camera:'#f0a946',
  taxes:'#9e7fe8', repair:'#888', usbank:'#5b9cf6',
  chase:'#56c27a', dmv:'#888', aeroplan:'#3dbf8a', other:'#555'
};
const getColor = a => COLORS[a] || COLORS.other;

// ── STATE ────────────────────────────────────────────────────────────────
let allData = [];
let currentView = 'overview';
let selYear = 'all';
let selAcct = 'all';
let trendChart = null;

// ── PARSE CSV ────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    return {
      year: vals[0], month: vals[1], period: vals[2],
      account: vals[3], description: vals[4],
      amount: parseFloat(vals[5]), status: vals[6], type: vals[7]
    };
  }).filter(r => r.amount > 0);
}

// ── LOAD DATA ────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('app').innerHTML = '<div class="loading" id="loadingMsg">loading ...</div>';
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('fetch failed');
    allData = parseCSV(await res.text());
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div style="padding:20px">
        <div class="error-msg">
          无法加载数据，请检查网络或 Sheets 发布设置。<br>
          <a href="${CSV_URL}" target="_blank">手动检查链接</a>
        </div>
      </div>`;
  }
}

// ── AGGREGATES ───────────────────────────────────────────────────────────
function getMonthKey(r) { return `${r.year}-${r.month.padStart(2,'0')}`; }

function monthlyTotals(data, type) {
  const map = {};
  data.filter(r => r.type === type).forEach(r => {
    const k = getMonthKey(r);
    map[k] = (map[k] || 0) + r.amount;
  });
  return map;
}

function acctTotals(data) {
  const map = {};
  data.filter(r => r.type === 'expense').forEach(r => {
    map[r.account] = (map[r.account] || 0) + r.amount;
  });
  return Object.entries(map).sort((a,b) => b[1]-a[1]);
}

// ── FORMAT ───────────────────────────────────────────────────────────────
const fmt = v => '$' + Math.round(v).toLocaleString();
const fmtD = v => '$' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

// ── VIEWS ────────────────────────────────────────────────────────────────
function showView(view) {
  currentView = view;
  ['overview','ledger','accounts'].forEach(v => {
    document.getElementById(`nav-${v}`).classList.toggle('active', v === view);
  });
  render();
}

function render() {
  document.getElementById('loadingMsg')?.remove();
  if (currentView === 'overview') renderOverview();
  else if (currentView === 'ledger') renderLedger();
  else renderAccounts();
}

function renderOverview() {
  const expenses = allData.filter(r => r.type === 'expense');
  const expMap = monthlyTotals(allData, 'expense');
  const savMap = monthlyTotals(allData, 'savings');
  const months = [...new Set([...Object.keys(expMap), ...Object.keys(savMap)])].sort();
  const expVals = Object.values(expMap);
  const totalExp = expVals.reduce((a,b)=>a+b,0);
  const avgExp = totalExp / expVals.length;
  const totalSav = Object.values(savMap).reduce((a,b)=>a+b,0);
  const maxVal = Math.max(...expVals);
  const maxKey = Object.keys(expMap).find(k => expMap[k] === maxVal) || '';

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div>
          <h1>slim / 记账</h1>
          <div class="total-display">${fmt(totalExp)}</div>
          <div class="total-label">总支出 · 2024–2026</div>
        </div>
        <button class="refresh-btn" onclick="loadData()" title="刷新">↻</button>
      </div>
    </div>

    <div class="metrics">
      <div class="metric-card">
        <div class="label">月均</div>
        <div class="value">${fmt(avgExp)}</div>
        <div class="sub">${expVals.length} 个月</div>
      </div>
      <div class="metric-card">
        <div class="label">储蓄</div>
        <div class="value" style="color:var(--green)">${fmt(totalSav)}</div>
        <div class="sub">已记录</div>
      </div>
      <div class="metric-card">
        <div class="label">最高月</div>
        <div class="value">${fmt(maxVal)}</div>
        <div class="sub">${maxKey}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">月度趋势</div>
      <div class="chart-container">
        <div class="legend-row">
          <div class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>支出</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--green);opacity:.6"></span>储蓄</div>
        </div>
        <div class="chart-wrap"><canvas id="trendChart" role="img" aria-label="月度趋势图"></canvas></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">最近账单</div>
      <div class="ledger" id="recentLedger"></div>
    </div>
  `;

  // Recent rows
  const recent = allData.filter(r => r.type === 'expense').slice(-12).reverse();
  const lb = document.getElementById('recentLedger');
  recent.forEach(r => {
    const c = getColor(r.account);
    lb.innerHTML += `<div class="ledger-row">
      <div class="row-date">${r.year}/${r.month.padStart(2,'0')}<br>${r.period}</div>
      <div class="row-desc"><span class="row-acct" style="color:${c}">${r.account}</span><span class="row-note">${r.description}</span></div>
      <div class="row-amt">${fmtD(r.amount)}</div>
    </div>`;
  });

  // Chart
  if (trendChart) { trendChart.destroy(); trendChart = null; }
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: months.map(m => { const [y,mo]=m.split('-'); return `${y.slice(2)}/${mo}`; }),
      datasets: [
        { data: months.map(m => Math.round(expMap[m]||0)), borderColor:'#5b9cf6', backgroundColor:'rgba(91,156,246,0.07)', tension:.35, fill:true, pointRadius:2.5, pointBackgroundColor:'#5b9cf6', borderWidth:1.5 },
        { data: months.map(m => Math.round(savMap[m]||0)), borderColor:'rgba(86,194,122,0.5)', backgroundColor:'rgba(86,194,122,0.04)', tension:.35, fill:true, pointRadius:2, pointBackgroundColor:'rgba(86,194,122,0.5)', borderWidth:1, borderDash:[4,3] }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ ticks:{color:'#555',font:{size:9},maxRotation:45}, grid:{display:false}, border:{display:false} },
        y:{ ticks:{color:'#555',font:{size:9},callback:v=>'$'+v.toLocaleString()}, grid:{color:'rgba(0,0,0,0.04)'}, border:{display:false} }
      }
    }
  });
}

function renderLedger() {
  const filtered = allData.filter(r => {
    if (selYear !== 'all' && r.year !== selYear) return false;
    if (selAcct !== 'all' && r.account !== selAcct) return false;
    return true;
  }).slice().reverse();

  const years = ['all','2024','2025','2026'];
  const accounts = ['all',...new Set(allData.map(r=>r.account))].sort();

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header"><h1>流水明细</h1></div>
    <div class="section">
      <div class="tabs">
        ${years.map(y=>`<div class="tab ${selYear===y?'active':''}" onclick="selYear='${y}';renderLedger()">${y==='all'?'全部':y}</div>`).join('')}
      </div>
      <div class="acct-pills">
        ${accounts.slice(0,12).map(a=>`<span class="pill ${selAcct===a?'active':''}" onclick="selAcct='${a}';renderLedger()">${a==='all'?'全部':a}</span>`).join('')}
      </div>
      <div class="ledger">
        <div class="ledger-head"><div>时间</div><div>账户 · 描述</div><div style="text-align:right">金额</div></div>
        ${filtered.map(r => {
          const c = getColor(r.account);
          const isSav = r.type==='savings';
          return `<div class="ledger-row ${isSav?'savings-row':''}">
            <div class="row-date">${r.year}/${r.month.padStart(2,'0')}<br>${r.period}</div>
            <div class="row-desc"><span class="row-acct" style="color:${c}">${r.account}</span><span class="row-note">${r.description}</span></div>
            <div class="row-amt">${isSav?'+':''}${fmtD(r.amount)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderAccounts() {
  const totals = acctTotals(allData);
  const maxAmt = totals[0]?.[1] || 1;

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header"><h1>账户分布</h1></div>
    <div class="section">
      <div class="acct-list">
        ${totals.map(([acct, amt]) => {
          const c = getColor(acct);
          const pct = (amt / maxAmt * 100).toFixed(1);
          return `<div class="acct-row">
            <div class="acct-bar-bg" style="width:${pct}%"></div>
            <span class="acct-dot" style="background:${c}"></span>
            <span class="acct-name">${acct}</span>
            <span class="acct-amount">${fmt(amt)}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}


loadData();
</script>
</body>
</html>
